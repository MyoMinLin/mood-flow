<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spike 007: Mood Data Persistence</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #fff; }
    .subtitle { color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .status { font-size: 0.8rem; margin-bottom: 1rem; }
    .status.loading { color: #60a5fa; }
    .status.ready { color: #4ade80; }
    .add-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .add-form input { flex: 1; min-width: 200px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; padding: 0.5rem 0.75rem; font-size: 0.9rem; }
    .add-form input:focus { outline: none; border-color: #555; }
    .add-form select { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; padding: 0.5rem; font-size: 0.9rem; }
    .add-form button { background: #2563eb; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .add-form button:hover { background: #1d4ed8; }
    .stats-bar { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; display: flex; gap: 1rem; flex-wrap: wrap; }
    .stat { font-size: 0.85rem; color: #aaa; }
    .persist-info { font-size: 0.75rem; color: #666; margin-bottom: 1rem; }
    .entry-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .entry-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.75rem; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; font-size: 0.85rem; }
    .date { color: #666; min-width: 80px; }
    .text { flex: 1; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mood { padding: 0.2rem 0.5rem; border-radius: 12px; font-size: 0.75rem; font-weight: 500; min-width: 80px; text-align: center; }
    .mood.positive { background: #052e16; color: #22c55e; }
    .mood.negative { background: #450a0a; color: #ef4444; }
    .mood.neutral { background: #422006; color: #eab308; }
    .btn-sm { background: none; border: none; color: #666; cursor: pointer; font-size: 0.8rem; padding: 0.2rem; }
    .btn-sm:hover { color: #ef4444; }
    .actions { margin-top: 1rem; }
    .actions button { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    .actions button:hover { border-color: #555; color: #fff; }
    .reload-hint { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 0.75rem 1rem; margin-top: 1rem; font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>
  <h1>Spike 007: Mood Data Persistence</h1>
  <p class="subtitle">sql.js + localStorage — mood data survives page reload</p>

  <div id="dbStatus" class="status loading">⏳ Loading sql.js...</div>

  <div class="add-form">
    <input type="text" id="entryText" placeholder="Type a diary entry...">
    <select id="entryMood">
      <option value="positive">😊 Positive</option>
      <option value="neutral">😐 Neutral</option>
      <option value="negative">😢 Negative</option>
    </select>
    <button onclick="addEntry()">Add</button>
  </div>

  <div class="stats-bar" id="stats"></div>
  <div class="persist-info" id="persistInfo"></div>

  <div class="entry-list" id="entries"></div>

  <div class="actions">
    <button onclick="clearDB()">Clear DB & Reload</button>
  </div>

  <div class="reload-hint">
    💡 <strong>Test persistence:</strong> Add entries, then refresh the page. Data should survive.
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
