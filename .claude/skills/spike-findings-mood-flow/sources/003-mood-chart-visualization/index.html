<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spike 003: Mood Chart Visualization</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #fff; }
    .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn:hover { border-color: #555; color: #fff; }
    .btn.active { border-color: #2563eb; color: #60a5fa; background: #1e293b; }

    .chart-container {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
    }
    canvas { max-height: 400px; }

    .legend {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: #aaa;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .stat-label {
      font-size: 0.75rem;
      color: #888;
      margin-top: 0.25rem;
    }

    .entry-list {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.5rem;
    }
    .entry-list h2 {
      font-size: 1rem;
      color: #888;
      margin-bottom: 1rem;
    }
    .entry-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid #222;
      font-size: 0.85rem;
    }
    .entry-row:last-child { border-bottom: none; }
    .entry-date { color: #666; min-width: 80px; }
    .entry-mood { font-weight: 600; min-width: 100px; }
    .entry-text { color: #aaa; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
    .neutral { color: #eab308; }
    .mixed { color: #a78bfa; }
  </style>
</head>
<body>
  <h1>Spike 003: Mood Chart Visualization</h1>
  <p class="subtitle">Chart.js with time axis — mood trends over a month of diary entries</p>

  <div class="controls">
    <button class="btn active" data-range="30" onclick="setRange(30, this)">30 Days</button>
    <button class="btn" data-range="14" onclick="setRange(14, this)">14 Days</button>
    <button class="btn" data-range="7" onclick="setRange(7, this)">7 Days</button>
    <button class="btn" onclick="addEntry()">+ Add Entry</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Positive</div>
    <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div> Neutral</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Negative</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div> Mixed</div>
  </div>

  <div class="chart-container">
    <canvas id="moodChart"></canvas>
  </div>

  <div class="stats" id="stats"></div>

  <div class="entry-list">
    <h2>Recent Entries</h2>
    <div id="entries"></div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
